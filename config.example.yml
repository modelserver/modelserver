# modelserver example configuration
#
# Copy this file to config.yml and adjust values for your environment.
# Most fields have sensible defaults; only the fields marked as REQUIRED
# must be provided before the server will start successfully.

server:
  # Address and port the reverse-proxy/API gateway listens on.
  proxy_addr: ":8080"
  # Address and port the admin/management API listens on.
  admin_addr: ":8081"
  # Maximum time allowed for a single upstream request (Go duration string).
  request_timeout: 600s
  # Maximum accepted request body size in bytes (default 50 MB).
  max_request_body: 52428800

db:
  # REQUIRED — PostgreSQL connection string.
  # Can also be set via MODELSERVER_DB_URL environment variable.
  url: "postgres://user:password@localhost:5432/modelserver?sslmode=disable"

auth:
  # REQUIRED — Secret used to sign JWT tokens. Use a long random string.
  # Can also be set via MODELSERVER_AUTH_JWT_SECRET environment variable.
  jwt_secret: "change-me-to-a-long-random-secret"
  # How long an access token remains valid.
  access_token_ttl: 15m
  # How long a refresh token remains valid.
  refresh_token_ttl: 168h  # 7 days

  oauth:
    github:
      client_id: ""
      client_secret: ""
    google:
      client_id: ""
      client_secret: ""
    oidc:
      # Issuer URL of your OpenID Connect provider (e.g. Keycloak, Dex).
      issuer_url: ""
      client_id: ""
      client_secret: ""
    hydra:
      admin_url: "http://hydra:4445"

encryption:
  # REQUIRED — 32-byte (base64 or hex) key used for at-rest encryption.
  # Can also be set via MODELSERVER_ENCRYPTION_KEY environment variable.
  key: "change-me-to-a-32-byte-secret-key"

trace:
  # HTTP header name used to propagate a trace identifier across services.
  trace_header: "X-Trace-Id"

collector:
  # Number of events per flush batch.
  batch_size: 100
  # How often the collector flushes its buffer to storage.
  flush_interval: 1s
  # Maximum number of events held in the in-memory buffer before back-pressure.
  buffer_size: 10000

log:
  # Logging verbosity: debug | info | warn | error
  level: "info"
  # Log output format: json | text
  format: "json"

cors:
  # List of origins allowed to make cross-origin requests.
  # An empty list disables CORS permitting only same-origin requests.
  allowed_origins:
    - "https://app.example.com"

billing:
  # HMAC-SHA256 secret used to verify payment webhook signatures.
  # Can also be set via MODELSERVER_BILLING_WEBHOOK_SECRET environment variable.
  webhook_secret: ""
  # Base URL of the external payment provider API.
  # Can also be set via MODELSERVER_BILLING_PAYMENT_API_URL environment variable.
  payment_api_url: ""
  # API key / bearer token for the external payment provider.
  # Can also be set via MODELSERVER_BILLING_PAYMENT_API_KEY environment variable.
  payment_api_key: ""
  # URL the payment provider will call when a payment is completed.
  # Can also be set via MODELSERVER_BILLING_NOTIFY_URL environment variable.
  notify_url: ""
  # URL the user is redirected to after completing payment.
  # Can also be set via MODELSERVER_BILLING_RETURN_URL environment variable.
  return_url: ""

extra_usage:
  # Global circuit breaker. When false, every extra-usage guard check
  # rejects regardless of per-project state. Use for emergencies.
  enabled: true
  # Conversion between catalog credits and CNY fen. 5438 = ¥54.38 per
  # 1M credits. Can be changed at runtime via admin API (hot-reload).
  credit_price_fen: 5438
  # Minimum accepted top-up amount (¥10).
  min_topup_fen: 1000
  # Maximum accepted per-request top-up amount (¥2000).
  max_topup_fen: 200000
  # Per-project daily cumulative top-up cap (¥5000).
  daily_topup_limit_fen: 500000
  # Timezone used for the monthly window boundary (shared with plans).
  monthly_window_tz: "Asia/Shanghai"

http_log:
  # Enable HTTP request/response logging to S3-compatible storage.
  enabled: false
  # S3 bucket name.
  bucket: "modelserver-body-logs"
  # AWS region (or MinIO region placeholder).
  region: "us-east-1"
  # Custom S3 endpoint for MinIO / R2 / etc. Leave empty for AWS S3.
  endpoint: "http://minio:9000"
  # Static credentials (also settable via MODELSERVER_HTTP_LOG_ACCESS_KEY_ID / SECRET_ACCESS_KEY).
  access_key_id: ""
  secret_access_key: ""
  # Use path-style addressing (required for MinIO).
  path_style: true
  # Maximum request/response body size to capture (bytes). Bodies exceeding this are truncated.
  max_request_body: 52428800
  max_response_body: 52428800
  # In-memory upload queue depth. Uploads exceeding this are dropped with a warning.
  buffer_size: 1000

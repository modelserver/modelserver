<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Authorization</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #111;
    }
    p.subtitle {
      color: #555;
      font-size: 0.95rem;
      margin: 0 0 1.5rem;
    }
    .error {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      color: #c0392b;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
    }
    .code-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1.4rem;
      font-family: monospace;
      letter-spacing: 0.15em;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .code-input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0,102,204,0.2);
    }
    .submit-btn {
      display: block;
      width: 100%;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 6px;
      background: #0066cc;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #0052a3; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .card { background: #2a2a2a; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
      h1 { color: #f0f0f0; }
      p.subtitle { color: #aaa; }
      .error { background: #3a1515; border-color: #6b2a2a; color: #f5a0a0; }
      .code-input { background: #333; color: #f0f0f0; border-color: #555; }
      .code-input:focus { border-color: #6bb5ff; box-shadow: 0 0 0 2px rgba(107,181,255,0.2); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Device Authorization</h1>
    <p class="subtitle">Enter the code displayed on your device to continue.</p>

    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/oauth/device">
      <input type="text" name="user_code" class="code-input"
             placeholder="XXXX-XXXX" maxlength="9"
             value="{{.UserCode}}" autocomplete="off" autofocus>
      <button type="submit" class="submit-btn">Continue</button>
    </form>
  </div>
</body>
</html>

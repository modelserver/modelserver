<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select a Project</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #111;
    }
    p.subtitle {
      color: #555;
      font-size: 0.95rem;
      margin: 0 0 1.5rem;
    }
    p.subtitle strong {
      color: #111;
    }
    .error {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      color: #c0392b;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
    }
    .projects {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .project-form {
      margin: 0;
      padding: 0;
    }
    .project-card {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #222;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .project-card:hover {
      background: #f7f7f7;
      border-color: #bbb;
    }
    .project-name {
      font-weight: 600;
      color: #111;
      display: block;
      margin-bottom: 0.2rem;
    }
    .project-meta {
      font-size: 0.875rem;
      color: #666;
    }
    .no-projects {
      color: #666;
      font-size: 0.9rem;
      text-align: center;
      padding: 1rem 0;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .card { background: #2a2a2a; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
      h1 { color: #f0f0f0; }
      p.subtitle { color: #aaa; }
      p.subtitle strong { color: #f0f0f0; }
      .error { background: #3a1515; border-color: #6b2a2a; color: #f5a0a0; }
      .project-card {
        background: #333;
        color: #e0e0e0;
        border-color: #555;
      }
      .project-card:hover {
        background: #3a3a3a;
        border-color: #777;
      }
      .project-name { color: #f0f0f0; }
      .project-meta { color: #999; }
      .no-projects { color: #999; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Select a Project</h1>
    <p class="subtitle">
      Grant <strong>{{.ClientID}}</strong> access to one of your projects:
    </p>

    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}

    {{if .Projects}}
    <div class="projects">
      {{range .Projects}}
      <form class="project-form" method="POST" action="/oauth/consent">
        <input type="hidden" name="consent_challenge" value="{{$.Challenge}}">
        <input type="hidden" name="project_id" value="{{.Project.ID}}">
        <button type="submit" class="project-card">
          <span class="project-name">{{.Project.Name}}</span>
          <span class="project-meta">
            {{if .Project.Description}}{{.Project.Description}} &middot; {{end}}Role: {{.Role}}
          </span>
        </button>
      </form>
      {{end}}
    </div>
    {{else}}
    <p class="no-projects">
      You are not a member of any projects. Please contact your administrator.
    </p>
    {{end}}
  </div>
</body>
</html>

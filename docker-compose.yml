services:
  postgres:
    image: postgres:18-alpine
    env_file: .env.postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-hydra-db.sql:/docker-entrypoint-initdb.d/init-hydra-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelserver"]
      interval: 5s
      timeout: 5s
      retries: 5

  hydra:
    image: oryd/hydra:v26.2.0
    command: serve all --dev
    env_file: .env.hydra
    expose:
      - "4444"
      - "4445"
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v26.2.0
    command: migrate sql up -e --yes
    env_file: .env.hydra
    depends_on:
      postgres:
        condition: service_healthy

  modelserver:
    build: .
    env_file: .env.modelserver
    expose:
      - "8080"
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      hydra:
        condition: service_started

  payserver:
    build: ./services/payserver
    env_file: .env.payserver
    expose:
      - "8090"
    depends_on:
      postgres:
        condition: service_healthy
      modelserver:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://codeapi.cs.ac.cn}
    env_file: .env.gateway
    ports:
      - "80:80"
    depends_on:
      - modelserver
      - payserver
      - hydra

volumes:
  pgdata:

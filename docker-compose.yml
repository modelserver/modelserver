services:
  postgres:
    image: postgres:18-alpine
    env_file: .env.postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelserver"]
      interval: 5s
      timeout: 5s
      retries: 5

  modelserver:
    build: .
    env_file: .env.modelserver
    expose:
      - "8080"
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy

  payserver:
    build: ./services/payserver
    env_file: .env.payserver
    expose:
      - "8090"
    depends_on:
      postgres:
        condition: service_healthy
      modelserver:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://codeapi.cs.ac.cn}
    env_file: .env.gateway
    ports:
      - "80:80"
    depends_on:
      - modelserver
      - payserver

volumes:
  pgdata:

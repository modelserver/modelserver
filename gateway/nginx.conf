upstream modelserver_admin {
    server modelserver:8081;
}

upstream modelserver_proxy {
    server modelserver:8080;
}

upstream payserver {
    server payserver:8090;
}

upstream hydra_public {
    server hydra:4444;
}

# ── Frontend: code.cs.ac.cn ──────────────────────────────
server {
    listen 80;
    server_name code.cs.ac.cn;

    root /usr/share/nginx/html/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Admin API + Hydra OAuth: codeapi.cs.ac.cn ────────────
server {
    listen 80;
    server_name codeapi.cs.ac.cn;

    # Hydra public endpoints (OAuth2 protocol)
    location /oauth2/ {
        proxy_pass http://hydra_public;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Well-known OpenID configuration
    location /.well-known/ {
        proxy_pass http://hydra_public;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → modelserver admin (including /oauth/login, /oauth/consent)
    location / {
        proxy_pass http://modelserver_admin;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── LLM Proxy: code.ai.cs.ac.cn ─────────────────────────
server {
    listen 80;
    server_name code.ai.cs.ac.cn;

    client_max_body_size 10m;

    location / {
        proxy_pass http://modelserver_proxy;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# ── Pay Callback: codepay.cs.ac.cn ───────────────────────
server {
    listen 80;
    server_name codepay.cs.ac.cn;

    location / {
        proxy_pass http://payserver;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
